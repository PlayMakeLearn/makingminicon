    /* ─── AGENDA: card centred layout ───────────────────────────── */
    .card { text-align: center; padding-bottom: 72px; }

    /* ─── COMING SOON CONTENT ────────────────────────────────────── */
    .cs-icon {
      margin: 0 auto 28px;
      width: 100px;
      height: 100px;
    }
    .cs-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 6vw, 2.8rem);
      color: var(--navy);
      margin-bottom: 16px;
    }
    .cs-desc {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #2a4a6a;
      max-width: 480px;
      margin: 0 auto 36px;
    }
    .divider { margin: 0 auto 28px; }

    /* ─── AGENDA-SPECIFIC ANIMATIONS ─────────────────────────────── */
    @keyframes clock-tick {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ─── RESPONSIVE (page-specific overrides) ───────────────────── */
    @media (max-width: 620px) {
      .card { padding: 52px 24px 56px; }
    }
